<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Worklog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Mono', monospace;
      background: #0f0f0f;
      color: #e8e4dc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }
    .wrap { width: 100%; max-width: 480px; }
    /* Header */
    .label { font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: 0.3em; color: #555; margin-bottom: 4px; }
    .clock-display { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 0.04em; line-height: 1; color: #e8e4dc; }
    .date-display { font-size: 11px; color: #555; margin-top: 4px; letter-spacing: 0.1em; }
    /* Cards */
    .card {
      background: #161616;
      border: 1px solid #272727;
      border-radius: 4px;
      padding: 28px 24px;
      margin-bottom: 16px;
    }
    /* Session banner */
    .session-banner {
      margin-bottom: 20px;
      padding: 12px 14px;
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 3px;
      display: none;
    }
    .session-banner.active { display: block; }
    .session-label { font-size: 10px; color: #555; letter-spacing: 0.2em; margin-bottom: 6px; }
    .session-row { display: flex; justify-content: space-between; align-items: baseline; }
    .session-in { font-size: 12px; color: #aaa; }
    .session-in span { color: #e8e4dc; }
    .session-elapsed { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #f0c060; letter-spacing: 0.05em; }
    /* Main button */
    .clock-btn {
      width: 100%;
      padding: 16px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.15em;
      border-radius: 3px;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
    }
    .clock-btn:active { transform: scale(0.97); }
    .clock-btn.in  { background: #1a3a2a; color: #60c08a; border: 1px solid #2a5a3a; }
    .clock-btn.out { background: #3a1a1a; color: #e06060; border: 1px solid #5a2a2a; }
    .break-note { margin-top: 12px; font-size: 10px; color: #444; text-align: center; letter-spacing: 0.1em; }
    /* Shifts panel */
    .shifts-card {
      background: #161616;
      border: 1px solid #272727;
      border-radius: 4px;
      overflow: hidden;
    }
    .shifts-header {
      padding: 14px 20px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .shifts-title { font-size: 10px; letter-spacing: 0.2em; color: #555; }
    .shifts-meta { display: flex; align-items: center; gap: 14px; }
    .shifts-total { font-size: 10px; color: #555; letter-spacing: 0.1em; }
    .shifts-total span { color: #f0c060; }
    .csv-btn {
      font-size: 10px;
      letter-spacing: 0.12em;
      padding: 5px 10px;
      border-radius: 3px;
      background: #1a1a2a;
      color: #7090d0;
      border: 1px solid #2a2a4a;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      transition: all 0.15s;
    }
    .csv-btn:active { transform: scale(0.97); }
    .empty-state { padding: 32px 20px; text-align: center; font-size: 11px; color: #3a3a3a; letter-spacing: 0.1em; }
    .shifts-list { max-height: 360px; overflow-y: auto; }
    .shift-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid #1e1e1e;
      font-size: 12px;
      transition: background 0.1s;
    }
    .shift-row:last-child { border-bottom: none; }
    .shift-row:hover { background: rgba(255,255,255,0.04); }
    .shift-date { color: #aaa; font-size: 10px; letter-spacing: 0.08em; margin-bottom: 2px; }
    .shift-times { color: #666; font-size: 11px; }
    .shift-col { text-align: right; }
    .col-label { color: #555; font-size: 10px; letter-spacing: 0.08em; margin-bottom: 2px; }
    .col-gross { color: #666; }
    .col-net { color: #e8e4dc; font-weight: 500; }
    .del-btn {
      background: none;
      border: none;
      color: #3a3a3a;
      font-size: 18px;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 2px;
      line-height: 1;
      font-family: inherit;
      transition: color 0.15s;
    }
    .del-btn:hover { color: #e06060; }
    .footer { margin-top: 16px; font-size: 10px; color: #2e2e2e; letter-spacing: 0.1em; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- Header -->
    <div style="margin-bottom:32px">
      <div class="label">WORKLOG</div>
      <div class="clock-display" id="clockDisplay">00:00:00</div>
      <div class="date-display" id="dateDisplay"></div>
    </div>

    <!-- Clock card -->
    <div class="card">
      <div class="session-banner" id="sessionBanner">
        <div class="session-label">SESSION IN PROGRESS</div>
        <div class="session-row">
          <span class="session-in">in at <span id="inAtTime"></span></span>
          <span class="session-elapsed" id="elapsedDisplay">0.00 hrs</span>
        </div>
      </div>
      <button class="clock-btn in" id="clockBtn" onclick="handleClock()">⏺&nbsp;&nbsp;CLOCK IN</button>
      <div class="break-note" id="breakNote">30 min break auto-deducted</div>
    </div>

    <!-- Shifts panel -->
    <div class="shifts-card">
      <div class="shifts-header">
        <span class="shifts-title">RECENT SHIFTS</span>
        <div class="shifts-meta" id="shiftsMeta" style="display:none">
          <span class="shifts-total" id="shiftsTotal"></span>
          <button class="csv-btn" onclick="exportCSV()">↓ CSV</button>
        </div>
      </div>
      <div id="shiftsBody">
        <div class="empty-state">NO SHIFTS RECORDED YET</div>
      </div>
    </div>

    <div class="footer">DATA SAVED LOCALLY · BREAK DEDUCTION: 0.5 HRS</div>
  </div>

  <script>
    const BREAK_HOURS = 0.5;
    let clockedIn = false;
    let clockInTime = null;
    let entries = [];

    try { entries = JSON.parse(localStorage.getItem('tt_entries') || '[]'); } catch {}

    function fmtTime(d) {
      return d.toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit', hour12: false });
    }
    function fmtDate(d) {
      return d.toLocaleDateString('en-CA', { weekday: 'short', month: 'short', day: 'numeric' });
    }
    function toDecimal(ms) { return Math.round((ms / 3600000) * 100) / 100; }

    function save() { localStorage.setItem('tt_entries', JSON.stringify(entries)); }

    function handleClock() {
      if (!clockedIn) {
        clockInTime = new Date();
        clockedIn = true;
        document.getElementById('clockBtn').className = 'clock-btn out';
        document.getElementById('clockBtn').innerHTML = '⏹&nbsp;&nbsp;CLOCK OUT';
        document.getElementById('breakNote').style.display = 'none';
        document.getElementById('inAtTime').textContent = fmtTime(clockInTime);
        document.getElementById('sessionBanner').classList.add('active');
      } else {
        const out = new Date();
        const raw = toDecimal(out - clockInTime);
        const net = Math.max(0, Math.round((raw - BREAK_HOURS) * 100) / 100);
        entries.unshift({ id: Date.now(), date: fmtDate(clockInTime), inTime: fmtTime(clockInTime), outTime: fmtTime(out), raw, net });
        save();
        clockedIn = false;
        clockInTime = null;
        document.getElementById('clockBtn').className = 'clock-btn in';
        document.getElementById('clockBtn').innerHTML = '⏺&nbsp;&nbsp;CLOCK IN';
        document.getElementById('breakNote').style.display = '';
        document.getElementById('sessionBanner').classList.remove('active');
        renderShifts();
      }
    }

    function removeEntry(id) {
      entries = entries.filter(e => e.id !== id);
      save();
      renderShifts();
    }

    function renderShifts() {
      const body = document.getElementById('shiftsBody');
      const meta = document.getElementById('shiftsMeta');
      if (entries.length === 0) {
        body.innerHTML = '<div class="empty-state">NO SHIFTS RECORDED YET</div>';
        meta.style.display = 'none';
        return;
      }
      const recent = entries.slice(0, 5);
      const total = recent.reduce((s, e) => s + e.net, 0);
      document.getElementById('shiftsTotal').innerHTML =
        `LAST ${recent.length} · <span>${total.toFixed(2)} hrs</span>`;
      meta.style.display = 'flex';
      body.innerHTML = '<div class="shifts-list">' +
        entries.map((e, i) => `
          <div class="shift-row">
            <div>
              <div class="shift-date">${e.date.toUpperCase()}</div>
              <div class="shift-times">${e.inTime} – ${e.outTime}</div>
            </div>
            <div class="shift-col">
              <div class="col-label">GROSS</div>
              <div class="col-gross">${e.raw.toFixed(2)}</div>
            </div>
            <div class="shift-col">
              <div class="col-label">NET</div>
              <div class="col-net">${e.net.toFixed(2)}</div>
            </div>
            <button class="del-btn" onclick="removeEntry(${e.id})">×</button>
          </div>`).join('') +
        '</div>';
    }

    function exportCSV() {
      const header = 'Date,Clock In,Clock Out,Gross Hours,Net Hours\n';
      const rows = [...entries].reverse().map(e =>
        `${e.date},${e.inTime},${e.outTime},${e.raw.toFixed(2)},${e.net.toFixed(2)}`
      ).join('\n');
      const blob = new Blob([header + rows], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `worklog-${new Date().toISOString().slice(0, 10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // Tick
    function tick() {
      const now = new Date();
      document.getElementById('clockDisplay').textContent =
        now.toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
      document.getElementById('dateDisplay').textContent =
        fmtDate(now).toUpperCase();
      if (clockedIn && clockInTime) {
        const elapsed = toDecimal(now - clockInTime);
        document.getElementById('elapsedDisplay').textContent = elapsed.toFixed(2) + ' hrs';
      }
    }

    renderShifts();
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
