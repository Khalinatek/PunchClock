<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>PunchClock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Mono', monospace; background: #0d0d00; color: #f0d800; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 16px 60px; }
    .wrap { width: 100%; max-width: 480px; }
    .header-row { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
    .logo { width: 44px; height: 44px; object-fit: contain; }
    .label { font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: 0.3em; color: #6b5e00; margin-bottom: 4px; }
    .clock-display { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 0.04em; line-height: 1; color: #f0d800; }
    .date-display { font-size: 11px; color: #6b5e00; margin-top: 4px; letter-spacing: 0.1em; }
    .card { background: #141400; border: 1px solid #2a2600; border-radius: 4px; padding: 28px 24px; margin-bottom: 16px; }
    .session-banner { margin-bottom: 20px; padding: 12px 14px; background: #1a1800; border: 1px solid #332e00; border-radius: 3px; display: none; }
    .session-banner.active { display: block; }
    .session-label { font-size: 10px; color: #6b5e00; letter-spacing: 0.2em; margin-bottom: 6px; }
    .session-row { display: flex; justify-content: space-between; align-items: baseline; }
    .session-in { font-size: 12px; color: #998700; }
    .session-in span { color: #f0d800; }
    .session-elapsed { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #f0d800; letter-spacing: 0.05em; }
    .clock-btn { width: 100%; padding: 16px; font-size: 13px; font-weight: 500; font-family: 'DM Mono', monospace; letter-spacing: 0.15em; border-radius: 3px; border: none; cursor: pointer; transition: all 0.15s; }
    .clock-btn:active { transform: scale(0.97); }
    .clock-btn.in  { background: #2a2600; color: #f0d800; border: 1px solid #f0d800; }
    .clock-btn.out { background: #3a0000; color: #e06060; border: 1px solid #5a2020; }
    .clock-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .break-note { margin-top: 12px; font-size: 10px; color: #3a3200; text-align: center; letter-spacing: 0.1em; }
    .status-bar { margin-top: 12px; font-size: 10px; text-align: center; letter-spacing: 0.1em; min-height: 14px; }
    .status-bar.ok      { color: #7a9000; }
    .status-bar.err     { color: #905050; }
    .status-bar.loading { color: #6b5e00; }
    .shifts-card { background: #141400; border: 1px solid #2a2600; border-radius: 4px; overflow: hidden; }
    .shifts-header { padding: 14px 20px; border-bottom: 1px solid #221e00; display: flex; justify-content: space-between; align-items: center; }
    .shifts-title { font-size: 10px; letter-spacing: 0.2em; color: #6b5e00; }
    .shifts-meta { display: flex; align-items: center; gap: 14px; }
    .shifts-total { font-size: 10px; color: #6b5e00; letter-spacing: 0.1em; }
    .shifts-total span { color: #f0d800; }
    .csv-btn { font-size: 10px; letter-spacing: 0.12em; padding: 5px 10px; border-radius: 3px; background: #1a1800; color: #f0d800; border: 1px solid #3a3200; cursor: pointer; font-family: 'DM Mono', monospace; transition: all 0.15s; }
    .csv-btn:active { transform: scale(0.97); }
    .empty-state { padding: 32px 20px; text-align: center; font-size: 11px; color: #2a2600; letter-spacing: 0.1em; }
    .shifts-list { max-height: 360px; overflow-y: auto; }
    .shift-row { display: grid; grid-template-columns: 1fr auto auto auto; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid #1e1a00; font-size: 12px; transition: background 0.1s; }
    .shift-row:last-child { border-bottom: none; }
    .shift-row:hover { background: rgba(240,216,0,0.04); }
    .shift-date { color: #998700; font-size: 10px; letter-spacing: 0.08em; margin-bottom: 2px; }
    .shift-times { color: #4a4200; font-size: 11px; }
    .shift-col { text-align: right; }
    .col-label { color: #4a4200; font-size: 10px; letter-spacing: 0.08em; margin-bottom: 2px; }
    .col-gross { color: #6b5e00; }
    .col-net { color: #f0d800; font-weight: 500; }
    .del-btn { background: none; border: none; color: #2a2600; font-size: 18px; cursor: pointer; padding: 2px 4px; border-radius: 2px; line-height: 1; font-family: inherit; transition: color 0.15s; }
    .del-btn:hover { color: #e06060; }
    .footer { margin-top: 16px; font-size: 10px; color: #2a2600; letter-spacing: 0.1em; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3a3200; border-radius: 2px; }
    .btn-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background-color: currentColor;
      border-radius: 50%;
      margin-right: 12px;
      vertical-align: middle;
    }
    /* Makes the dot pulse while clocked in */
    .clock-btn.out .btn-dot {
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; }
    }
  </style>
</head>

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP//9uCQAAAAAEDQ/9dmPwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAF+d6gIB7NzcFAAAAAElFTkSuQmCC" alt="Singularity Technologies" />
        <div>
          <div class="label">SINGULARITY TECHNOLOGIES</div>
          <div class="clock-display" id="clockDisplay">00:00:00</div>
        </div>
      </div>
      <div class="date-display" id="dateDisplay"></div>
    </div>

    <div class="card">
      <div class="session-banner" id="sessionBanner">
        <div class="session-label">SESSION IN PROGRESS</div>
        <div class="session-row">
          <span class="session-in">in at <span id="inAtTime"></span></span>
          <span class="session-elapsed" id="elapsedDisplay">0.00 hrs</span>
        </div>
      </div>
      <!-- Disabled until data is loaded to prevent race conditions -->
      <button class="clock-btn in" id="clockBtn" onclick="handleClock()" disabled>
        <span class="btn-dot"></span>CLOCK IN
      </button>
      <div class="break-note" id="breakNote">30 min break auto-deducted (shifts 8.5+ hrs)</div>
      <div class="status-bar" id="statusBar"></div>
    </div>

    <div class="shifts-card">
      <div class="shifts-header">
        <span class="shifts-title">RECENT SHIFTS</span>
        <div class="shifts-meta" id="shiftsMeta" style="display:none">
          <span class="shifts-total" id="shiftsTotal"></span>
          <button class="csv-btn" onclick="exportCSV()">↓ CSV</button>
        </div>
      </div>
      <div id="shiftsBody">
        <div class="empty-state">LOADING...</div>
      </div>
    </div>

    <div class="footer">DATA SYNCED TO GOOGLE SHEETS · BREAK DEDUCTION: 0.5 HRS (8.5+ HR SHIFTS)</div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxKgZycouQzTt74qJ2rUvww2F6OwNGIgfSp4vepEA0Ri30PeXYj4msSA8xpHdbWJxy6nw/exec';
    const BREAK_HOURS = 0.5;
    let entries = [];
    let clockedIn = false;
    let clockInTime = null;

    function fmtTime(d) { return d.toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit', hour12: false }); }
    function fmtDate(d) { return d.toLocaleDateString('en-CA', { weekday: 'short', month: 'short', day: 'numeric' }); }
    function toDecimal(ms) { return Math.round((ms / 3600000) * 100) / 100; }

    function setStatus(msg, type) {
      const el = document.getElementById('statusBar');
      el.textContent = msg;
      el.className = 'status-bar ' + (type || '');
    }
    function setBtn(disabled) { document.getElementById('clockBtn').disabled = disabled; }

    function restoreClockInUI() {
      document.getElementById('clockBtn').className = 'clock-btn out';
      // Included the span for the dot animation target
      document.getElementById('clockBtn').innerHTML = '<span class="btn-dot"></span>⏹&nbsp;&nbsp;CLOCK OUT';
      document.getElementById('breakNote').style.display = 'none';
      document.getElementById('inAtTime').textContent = fmtTime(clockInTime);
      document.getElementById('sessionBanner').classList.add('active');
    }

    async function loadEntries() {
      try {
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();
        entries = data.rows
          .filter(r => r[0] && r[0] !== 'Date')
          .map(r => ({ date: r[0], inTime: r[1], outTime: r[2], raw: parseFloat(r[3]), net: parseFloat(r[4]), id: r[5] ? r[5].toString() : '' }))
          .reverse();
        // Restore clock-in state from Sheets
        if (data.clockInTime) {
          clockedIn = true;
          clockInTime = new Date(data.clockInTime);
          restoreClockInUI();
        }
        renderShifts();
        setBtn(false); // Enable the button once data is resolved
      } catch {
        setStatus('COULD NOT CONNECT TO SHEETS', 'err');
        document.getElementById('shiftsBody').innerHTML = '<div class="empty-state">CONNECTION ERROR</div>';
      }
    }

    async function handleClock() {
      if (!clockedIn) {
        clockInTime = new Date();
        clockedIn = true;
        restoreClockInUI();
        setStatus('', '');
        // Save clock-in time to Sheets
        fetch(SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'clockin', clockInTime: clockInTime.toISOString() }) });
      } else {
        const out = new Date();
        const raw = toDecimal(out - clockInTime);
        
        // Break deduction logic: only deduct 0.5 if raw hours are >= 8.5
        const net = raw >= 8.5 ? Math.max(0, Math.round((raw - BREAK_HOURS) * 100) / 100) : raw;
        
        const id = out.getTime().toString();
        const entry = { date: fmtDate(clockInTime), inTime: fmtTime(clockInTime), outTime: fmtTime(out), raw, net, id };
        
        clockedIn = false; 
        clockInTime = null;
        
        document.getElementById('clockBtn').className = 'clock-btn in';
        document.getElementById('clockBtn').innerHTML = '<span class="btn-dot"></span>CLOCK IN';
        document.getElementById('breakNote').style.display = '';
        document.getElementById('sessionBanner').classList.remove('active');
        
        entries.unshift(entry);
        renderShifts();
        setStatus('SAVING...', 'loading');
        setBtn(true);
        
        try {
          await fetch(SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'add', ...entry }) });
          setStatus('SAVED TO SHEETS ✓', 'ok');
          setTimeout(() => setStatus('', ''), 3000);
        } catch { 
          setStatus('SAVE FAILED — CHECK CONNECTION', 'err'); 
        } finally { 
          setBtn(false); 
        }
      }
    }

    async function removeEntry(id) {
      entries = entries.filter(e => e.id !== id);
      renderShifts();
      setStatus('DELETING...', 'loading');
      try {
        const res = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'delete', id: id.toString() })
        });
        const data = await res.json();
        if (data.ok) {
          setStatus('DELETED ✓', 'ok');
          setTimeout(() => { setStatus('', ''); loadEntries(); }, 1500);
        } else {
          setStatus('DELETE FAILED', 'err');
        }
      } catch { setStatus('DELETE FAILED — CHECK CONNECTION', 'err'); }
    }

    function renderShifts() {
      const body = document.getElementById('shiftsBody');
      const meta = document.getElementById('shiftsMeta');
      if (entries.length === 0) {
        body.innerHTML = '<div class="empty-state">NO SHIFTS RECORDED YET</div>';
        meta.style.display = 'none'; return;
      }
      const recent = entries.slice(0, 5);
      const total = recent.reduce((s, e) => s + e.net, 0);
      document.getElementById('shiftsTotal').innerHTML = 'LAST ' + recent.length + ' · <span>' + total.toFixed(2) + ' hrs</span>';
      meta.style.display = 'flex';
      body.innerHTML = '<div class="shifts-list">' +
        entries.map(e => '<div class="shift-row"><div><div class="shift-date">' + String(e.date).toUpperCase() + '</div><div class="shift-times">' + e.inTime + ' – ' + e.outTime + '</div></div><div class="shift-col"><div class="col-label">GROSS</div><div class="col-gross">' + parseFloat(e.raw).toFixed(2) + '</div></div><div class="shift-col"><div class="col-label">NET</div><div class="col-net">' + parseFloat(e.net).toFixed(2) + '</div></div><button class="del-btn" onclick="removeEntry(\'' + e.id + '\')">×</button></div>').join('') +
        '</div>';
    }

    function exportCSV() {
      const header = 'Date,Clock In,Clock Out,Gross Hours,Net Hours\n';
      const rows = [...entries].reverse().map(e => e.date + ',' + e.inTime + ',' + e.outTime + ',' + parseFloat(e.raw).toFixed(2) + ',' + parseFloat(e.net).toFixed(2)).join('\n');
      const blob = new Blob([header + rows], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'punchclock-' + new Date().toISOString().slice(0, 10) + '.csv';
      a.click();
      URL.revokeObjectURL(url);
    }

    function tick() {
      const now = new Date();
      document.getElementById('clockDisplay').textContent = now.toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
      document.getElementById('dateDisplay').textContent = fmtDate(now).toUpperCase();
      if (clockedIn && clockInTime) document.getElementById('elapsedDisplay').textContent = toDecimal(now - clockInTime).toFixed(2) + ' hrs';
    }

    loadEntries(); tick(); setInterval(tick, 1000);
  </script>
</body>
